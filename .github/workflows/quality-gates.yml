name: release-gate

on:
  pull_request:
  push:
    branches: ["main", "master", "work"]

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-quality-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Architecture quality gate
        run: bash scripts/quality_gate.sh

      - name: Security anonymity checks
        run: bash scripts/security_anonymity_check.sh

      - name: Attack-surface checks
        run: bash scripts/security_attack_surface_check.sh

      - name: Crash-resilience checks
        run: bash scripts/crash_resilience_check.sh

  e2e-critical-path:
    runs-on: ubuntu-latest
    needs: static-quality-security
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anonkeymail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anonkeymail
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_DOMAIN: www.time-email.com
      PRIMARY_MAIL_DOMAIN: time-email.net
      ADMIN_SUPER_KEY: test-admin-key
      INGEST_API_KEY: test-ingest-key
      STARS_WEBHOOK_SECRET: stars_test_secret
      CRYPTOBOT_WEBHOOK_SECRET: crypto_test_secret
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: |
          npm run prisma:generate
          npm run prisma:push

      - name: Start app
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /tmp/health.json; then
              cat /tmp/health.json
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3000/api/health >/dev/null

      - name: E2E smoke matrix (blocking)
        run: bash scripts/e2e_smoke_matrix.sh

      - name: E2E webhook contracts (blocking)
        env:
          APP_URL: http://127.0.0.1:3000
          ALLOW_SKIP: "0"
          STARS_SECRET: stars_test_secret
          CRYPTO_SECRET: crypto_test_secret
        run: bash scripts/e2e_webhook_contracts.sh

      - name: Upload app logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: next-dev-log
          path: /tmp/next-dev.log

  release-readiness:
    runs-on: ubuntu-latest
    needs: [static-quality-security, e2e-critical-path]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anonkeymail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anonkeymail
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_DOMAIN: www.time-email.com
      PRIMARY_MAIL_DOMAIN: time-email.net
      ADMIN_SUPER_KEY: test-admin-key
      INGEST_API_KEY: test-ingest-key
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: |
          npm run prisma:generate
          npm run prisma:push

      - name: Start app
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3000/api/health >/dev/null

      - name: Staging load/SLO gate
        env:
          APP_URL: http://127.0.0.1:3000
          ALLOW_SKIP: "0"
          REQS: "120"
          CONCURRENCY: "12"
          P95_TARGET_MS: "1000"
        run: bash scripts/staging_load_slo.sh

      - name: Release gate summary
        run: |
          echo "GO/NO-GO summary"
          echo "- static-quality-security: PASS"
          echo "- e2e-critical-path: PASS"
          echo "- staging-load-slo: PASS"

      - name: Upload app logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: next-dev-log
          path: /tmp/next-dev.log
